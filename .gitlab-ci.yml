stages:
  - lint
  - test
  - build
  - security

variables:
  NODE_VERSION: '22-alpine'
  TRIVY_VERSION: '0.51.2'
  TRIVY_NO_PROGRESS: 'true'
  TRIVY_SEVERITY: 'CRITICAL,HIGH'

# ---------------- LINT ----------------
lint:backend:
  stage: lint
  image: node:${NODE_VERSION}
  cache:
    key: backend-deps
    paths:
      - backend/node_modules/
  before_script:
    - cd backend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run lint

lint:frontend:
  stage: lint
  image: node:${NODE_VERSION}
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run lint

# ---------------- TEST ----------------
test:backend:
  stage: test
  image: node:${NODE_VERSION}
  needs: ['lint:backend']
  cache:
    key: backend-deps
    paths:
      - backend/node_modules/
  before_script:
    - cd backend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run test

test:frontend:
  stage: test
  image: node:${NODE_VERSION}
  needs: ['lint:frontend']
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run test

# ---------------- BUILD ----------------
build:backend:
  stage: build
  image: node:${NODE_VERSION}
  needs: ['test:backend']
  cache:
    key: backend-deps
    paths:
      - backend/node_modules/
  before_script:
    - cd backend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run build
  artifacts:
    paths:
      - backend/dist/
    expire_in: 1 day

build:frontend:
  stage: build
  image: node:${NODE_VERSION}
  needs: ['test:frontend']
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 day

# ---------------- SECURITY ----------------
security:trivy-fs:
  stage: security
  image:
    name: aquasec/trivy:${TRIVY_VERSION}
    entrypoint: ['']
  needs: ['build:backend', 'build:frontend']
  script:
    - trivy fs --exit-code 1 --severity ${TRIVY_SEVERITY} --ignore-unfixed .
