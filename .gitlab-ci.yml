stages:
  - lint
  - test
  - build
  - security

variables:
  NODE_VERSION: '22'
  TRIVY_VERSION: '0.51.2'
  TRIVY_NO_PROGRESS: 'true'
  TRIVY_SEVERITY: 'CRITICAL,HIGH'

default:
  interruptible: true

# Reusable cache anchors: node_modules keyed by the lockfile of each project.
# A changed package-lock.json invalidates the cache and forces a clean install.
.backend_cache: &backend_cache
  key:
    files:
      - backend/package-lock.json
  paths:
    - backend/node_modules/

.frontend_cache: &frontend_cache
  key:
    files:
      - frontend/package-lock.json
  paths:
    - frontend/node_modules/

# ---------------- LINT ----------------
lint:backend:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  cache:
    <<: *backend_cache
  before_script:
    - cd backend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run lint

lint:frontend:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  cache:
    <<: *frontend_cache
  before_script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run lint

# ---------------- TEST ----------------
test:backend:
  stage: test
  image: node:${NODE_VERSION}-alpine
  needs: ['lint:backend']
  cache:
    <<: *backend_cache
  before_script:
    - cd backend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run test

test:frontend:
  stage: test
  image: node:${NODE_VERSION}-alpine
  needs: ['lint:frontend']
  cache:
    <<: *frontend_cache
  before_script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run test

# ---------------- BUILD ----------------
build:backend:
  stage: build
  image: node:${NODE_VERSION}-alpine
  needs: ['test:backend']
  cache:
    <<: *backend_cache
  before_script:
    - cd backend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run build
  artifacts:
    paths:
      - backend/dist/
    expire_in: 1 day

build:frontend:
  stage: build
  image: node:${NODE_VERSION}-alpine
  needs: ['test:frontend']
  cache:
    <<: *frontend_cache
  before_script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 day

# ---------------- SECURITY ----------------
security:trivy-fs:
  stage: security
  image:
    name: aquasec/trivy:${TRIVY_VERSION}
    entrypoint: ['']
  needs: ['build:backend', 'build:frontend']
  script:
    - trivy fs --exit-code 1 --severity ${TRIVY_SEVERITY} --ignore-unfixed .
