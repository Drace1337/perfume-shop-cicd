stages:
  - lint
  - test
  - build
  - security
  - deploy

variables:
  NODE_VERSION: '22-alpine'
  TRIVY_VERSION: '0.51.2'
  TRIVY_NO_PROGRESS: 'true'
  TRIVY_SEVERITY: 'CRITICAL,HIGH'

# ---------------- LINT ----------------
lint:backend:
  stage: lint
  image: node:${NODE_VERSION}
  cache:
    key: backend-deps
    paths:
      - backend/node_modules/
  before_script:
    - cd backend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run lint

lint:frontend:
  stage: lint
  image: node:${NODE_VERSION}
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run lint

# ---------------- TEST ----------------
test:backend:
  stage: test
  image: node:${NODE_VERSION}
  needs: ['lint:backend']
  cache:
    key: backend-deps
    paths:
      - backend/node_modules/
  before_script:
    - cd backend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run test

test:frontend:
  stage: test
  image: node:${NODE_VERSION}
  needs: ['lint:frontend']
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run test

# ---------------- BUILD ----------------
build:backend:
  stage: build
  image: node:${NODE_VERSION}
  needs: ['test:backend']
  cache:
    key: backend-deps
    paths:
      - backend/node_modules/
  before_script:
    - cd backend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run build
  artifacts:
    paths:
      - backend/dist/
    expire_in: 1 day

build:frontend:
  stage: build
  image: node:${NODE_VERSION}
  needs: ['test:frontend']
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 day

# --- BUILD ONCE: budowa i push obrazów do Docker Hub ---
# Ciężka kompilacja odbywa się tutaj (runner GitLab), nie na t3.micro.
# Docker-in-Docker (dind) daje izolowany demon Dockera wewnątrz joba.
build:images:
  stage: build
  image: docker:27.1.1
  services:
    - docker:27.1.1-dind
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
    BACKEND_IMAGE: docker.io/drace1337/perfume-shop-backend
    FRONTEND_IMAGE: docker.io/drace1337/perfume-shop-frontend
  needs: ['test:backend', 'test:frontend']
  before_script:
    # Hasło przez STDIN => nie ląduje w historii ani w tabeli procesów.
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
  script:
    - docker build -t $BACKEND_IMAGE:latest -t $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA ./backend
    - docker build -t $FRONTEND_IMAGE:latest -t $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA ./frontend
    - docker push $BACKEND_IMAGE:latest
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $FRONTEND_IMAGE:latest
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
  after_script:
    - docker logout

# ---------------- SECURITY ----------------
security:trivy-fs:
  stage: security
  image:
    name: aquasec/trivy:${TRIVY_VERSION}
    entrypoint: ['']
  needs: ['build:backend', 'build:frontend']
  script:
    - trivy fs --exit-code 1 --severity ${TRIVY_SEVERITY} --ignore-unfixed .

# ---------------- DEPLOY ----------------
# ARCHITEKTURA BEZPIECZEŃSTWA — GitLab CI:
# Sekrety pochodzą z "CI/CD Variables" (Settings -> CI/CD -> Variables),
# oznaczonych jako 'Masked' (ukrywane w logach) i 'Protected' (dostępne tylko
# na chronionych gałęziach). GitLab wstrzykuje je jako zmienne środowiskowe
# joba, więc konwencja TF_VAR_* pozwala Terraformowi odczytać je automatycznie.
deploy:terraform:
  stage: deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: ['']
  # 'when: manual' => infrastruktura nie stawia się automatycznie przy commicie.
  when: manual
  # Nie blokuj potoku, jeśli deploy nie zostanie ręcznie uruchomiony.
  allow_failure: false
  needs: ['security:trivy-fs', 'build:images']
  variables:
    AWS_DEFAULT_REGION: eu-central-1
    # Mapowanie natywnych sekretów GitLab na zmienne rozpoznawane przez Terraform.
    TF_VAR_db_password: ${DB_PASSWORD}
    TF_VAR_jwt_secret: ${JWT_SECRET}
  before_script:
    - cd terraform
  script:
    - terraform init -input=false
    - terraform plan -input=false -out=tfplan
    - terraform apply -input=false -auto-approve tfplan
