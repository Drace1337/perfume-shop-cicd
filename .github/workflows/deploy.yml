name: CD (Build, push & Terraform deploy)

# Wdrożenie jest świadomie ODDZIELONE od CI i uruchamiane wyłącznie ręcznie
# (workflow_dispatch), co zapewnia kontrolowane warunki pomiaru w pracy.
on:
  workflow_dispatch:

# Zawężenie uprawnień domyślnego tokenu GITHUB_TOKEN (zasada least privilege).
permissions:
  contents: read

# Blokada równoległych wdrożeń (współpracuje ze State Lockiem DynamoDB).
concurrency:
  group: terraform-deploy
  cancel-in-progress: false

env:
  BACKEND_IMAGE: drace1337/perfume-shop-backend
  FRONTEND_IMAGE: drace1337/perfume-shop-frontend

jobs:
  # ---------------------------------------------------------------------------
  #  ETAP 1 — BUILD ONCE: obrazy budowane raz w CI i wypychane do Docker Hub.
  #  Ciężka kompilacja (npm run build) odbywa się tu, a NIE na t3.micro.
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Logowanie do Docker Hub. Sekrety pochodzą z GitHub Encrypted Secrets;
      # docker/login-action maskuje hasło i nie zapisuje go trwale na runnerze.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Dwa tagi: 'latest' (dla serwera) oraz SHA commita (pełna identyfikowalność
      # / traceability — istotne dla odtwarzalnych wdrożeń w pracy).
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ---------------------------------------------------------------------------
  #  ETAP 2 — DEPLOY ANYWHERE: Terraform stawia/aktualizuje infrastrukturę AWS.
  #  Serwer pobierze świeżo wypchnięte obrazy (docker compose pull).
  # ---------------------------------------------------------------------------
  deploy:
    name: Terraform apply
    needs: build-push
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    # ---------------------------------------------------------------------
    #  ARCHITEKTURA BEZPIECZEŃSTWA — GitHub Actions:
    #  Sekrety pochodzą z natywnego magazynu "GitHub Encrypted Secrets".
    #  Wstrzykujemy je przez ${{ secrets.* }}; GitHub MASKUJE ich wartości
    #  w logach. Konwencja TF_VAR_<nazwa> sprawia, że Terraform sam odczytuje
    #  zmienne db_password / jwt_secret bez podawania ich w wierszu poleceń.
    # ---------------------------------------------------------------------
    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Klucze AWS trafiają do środowiska jako krótko żyjące zmienne sesji;
      # akcja konfiguruje domyślny łańcuch poświadczeń AWS SDK.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
