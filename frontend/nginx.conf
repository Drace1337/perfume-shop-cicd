server {
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	# SPA — wszystkie ścieżki front-endowe obsługuje index.html (React Router).
	location / {
		try_files $uri $uri/ /index.html;
	}

	# Reverse proxy: żądania /api/* trafiają do kontenera backendu w sieci Dockera.
	# Dzięki temu przeglądarka odpytuje ścieżkę WZGLĘDNĄ (/api/...), a obraz frontendu
	# jest w 100% niezależny od środowiska (rozwiązuje problem "chicken-and-egg"
	# z nieznanym publicznym IP serwera w fazie budowania obrazu).
	location /api/ {
		proxy_pass http://backend:4000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
